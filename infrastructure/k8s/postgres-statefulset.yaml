apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexus-postgres
spec:
  serviceName: "nexus-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: nexus-postgres
  template:
    metadata:
      labels:
        app: nexus-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: nexus_db
        - name: POSTGRES_USER
          value: nexus_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: postgres-password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-postgres
spec:
  selector:
    app: nexus-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
